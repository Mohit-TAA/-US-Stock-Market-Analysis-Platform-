version: '3.8'

services:
  # Main Streamlit Application
  stockai-app:
    build: .
    container_name: stockai-pro
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://stockai:stockai_password@postgres:5432/stockai
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - stockai-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: stockai-postgres
    environment:
      - POSTGRES_USER=stockai
      - POSTGRES_PASSWORD=stockai_password
      - POSTGRES_DB=stockai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - stockai-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stockai-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - stockai-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: stockai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - stockai-app
    restart: unless-stopped
    networks:
      - stockai-network

volumes:
  postgres-data:
  redis-data:

networks:
  stockai-network:
    driver: bridge
